name: knewtab deploy

on:
  push:
    tags:
      - "knewtab-v[0-9]+.[0-9]+.[0-9]+"

env:
  XPI_EXPORT: /${{ github.ref_name }}.xpi

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: code/tools/knewtab
    steps:
      - uses: actions/checkout@v6
      - run: corepack enable && yarn
      - run: |
          yarn web-ext --verbose sign --ignore-files=Makefile tabs/**/* package.json yarn.lock \
            --channel=unlisted \
            --api-key=${{ secrets.AMO_JWT_ISSUER }} \
            --api-secret=${{ secrets.AMO_JWT_SECRET }}

      - name: Obtain the output file.
        run: |
          SUSPECT=$(find * -name '*.xpi')
          sudo cp $SUSPECT ${{ env.XPI_EXPORT }}

      - uses: actions/upload-artifact@v7
        with:
          name: knewtab
          path: ${{ env.XPI_EXPORT }}

      - name: Create a release
        uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ env.XPI_EXPORT }}
